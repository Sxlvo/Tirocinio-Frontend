<div class="login-container">
  <div class="login-box">
    <h2>Login Microsoft</h2>
    <p class="subtitle">Accedi con il tuo account Microsoft per entrare nel gestionale.</p>

    <button type="button" (click)="loginMicrosoft()" [disabled]="loading">
      {{ loading ? 'Accesso in corso...' : 'Accedi con Microsoft' }}
    </button>

    @if (errore) {
      <p class="errore">{{ errore }}</p>
    }
  </div>
</div>
