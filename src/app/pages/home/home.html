<div class="home-container">

  <!-- TITOLO -->
  <h2 class="welcome" *ngIf="auth.isLoggedIn()">
    Benvenuto {{ auth.getUserName() }}
  </h2>

  <!-- BOX -->
  <div class="cards">

    <!-- PRODOTTI -->
    <div
      routerLink="/prodotti"
      class="card"
    >
      <h3>Prodotti</h3>
      <p>Visualizza catalogo</p>
    </div>

    <!-- CLIENTI -->
    <div
      routerLink="/clienti"
      class="card"
    >
      <h3>Clienti</h3>
      <p>Anagrafica clienti</p>
    </div>

    <!-- ORDINI -->
    <div
      routerLink="/ordini"
      class="card"
    >
      <h3>Ordini</h3>
      <p>Lista ordini</p>
    </div>

  </div>

</div>
