<div class="app-shell">
  <header class="topbar">
    <a routerLink="/" class="brand">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="30"
        height="30"
        fill="white"
        viewBox="0 -1 28 30"
      >
        <path d="M3 11.5L12 4l9 7.5v8a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1v-8z" />
      </svg>

      <span>BS Solution - Tirocinio</span>
    </a>

    <nav class="nav-area">
      @if (auth.isLoggedIn()) {
        <span class="user-pill">
          {{ auth.getUserName() }}
        </span>

        <a routerLink="/prodotti" class="nav-link">Prodotti</a>
        <a routerLink="/clienti" class="nav-link">Clienti</a>
        <a routerLink="/ordini" class="nav-link">Ordini</a>

        <button type="button" class="logout-btn" (click)="logout()">
          Logout
        </button>
      } @else {
        <a routerLink="/login" class="login-btn">
          Login Microsoft
        </a>
      }
    </nav>
  </header>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
